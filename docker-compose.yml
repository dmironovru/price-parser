services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-parser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-parserdb}
      POSTGRES_USER: ${DB_USER:-parseruser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - ai-parser-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-parseruser} -d ${DB_NAME:-parserdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-parser-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - ai-parser-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  ai-parser-net:
    driver: bridge

volumes:
  pgdata:
  redisdata: