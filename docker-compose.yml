version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: price-parser-postgres
    environment:
      POSTGRES_USER: parser
      POSTGRES_PASSWORD: parser_pass
      POSTGRES_DB: price_parser
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - price-parser-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: price-parser-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - price-parser-network
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: price-parser-meilisearch
    environment:
      MEILI_MASTER_KEY: meili_master_key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - price-parser-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: price-parser-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - price-parser-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  price-parser-network:
    driver: bridge
